<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marcha — Motor de Decisión</title>

<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: linear-gradient(180deg, #071224, #0a1628);
  color: #e6edf3;
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 16px;
}

/* HEADER */
.header {
  background: #0f1f3a;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin: 8px 0 0;
  color: #8aa2c7;
}

/* FORM */
.card {
  background: #0f1f3a;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: none;
  background: #071224;
  color: #fff;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #ff7a18;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* RESULT */
.result-card {
  background: #102547;
  border-radius: 16px;
  padding: 16px;
  margin-top: 16px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.station-name {
  font-size: 20px;
  font-weight: bold;
}

.station-addr {
  font-size: 13px;
  color: #9fb3d1;
  margin-bottom: 10px;
}

.price {
  font-size: 28px;
  font-weight: bold;
}

.meta {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 14px;
}

/* ALT */
.alt-section {
  margin-top: 16px;
}

.alt-card {
  background: #0b1b33;
  border-radius: 10px;
  padding: 10px;
  margin-top: 8px;
}

.alt-title {
  font-size: 12px;
  color: #7fa4ff;
}

.alt-name {
  font-weight: bold;
}

.alt-addr {
  font-size: 12px;
  color: #8aa2c7;
}

/* STATUS */
.status {
  margin-top: 12px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>⛽ Marcha</h1>
    <p>Decide si conviene cargar · no adivina, calcula</p>
  </div>

  <div class="card">
    <label>Ubicación</label>
    <input id="location" placeholder="Ej: Llay-Llay"/>

    <label>Rendimiento (km/L)</label>
    <input id="km" value="13"/>

    <label>Estanque (L)</label>
    <input id="tank" value="56"/>

    <label>Presupuesto ($)</label>
    <input id="budget" value="25000"/>

    <label>Nivel (%)</label>
    <input id="level" value="25"/>

    <label>Combustible</label>
    <select id="fuel">
      <option>diesel</option>
      <option>93</option>
      <option>95</option>
      <option>97</option>
    </select>

    <button onclick="evaluar()">Evaluar</button>
  </div>

  <div id="result"></div>

</div>

<script>

function fmt(n){
  return Number(n).toLocaleString("es-CL");
}

async function evaluar() {

  const body = {
    location: document.getElementById('location').value,
    fuel_consumption: Number(document.getElementById('km').value),
    tank_capacity: Number(document.getElementById('tank').value),
    budget_today: Number(document.getElementById('budget').value),
    current_level_pct: Number(document.getElementById('level').value),
    fuel_type: document.getElementById('fuel').value
  };

  const res = await fetch('/api/decide', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  render(data);
}

function render(data){

  if(!data || !data.recommendation){
    document.getElementById('result').innerHTML = "Sin datos";
    return;
  }

  const r = data.recommendation;
  const s = r.station || {};

  const alt = (data.alternatives || []).slice(0,2).map((a,i)=>{
    const st = a.station || {};
    return `
      <div class="alt-card">
        <div class="alt-title">${i==0?'SEGUNDA OPCIÓN':'TERCERA OPCIÓN'}</div>
        <div class="alt-name">${st.nombre_legal || 'Estación'}</div>
        <div class="alt-addr">${st.direccion || ''}</div>
        <div>$${fmt(a.display_price)} /L · ${a.display_distance_km} km</div>
      </div>
    `;
  }).join('');

  document.getElementById('result').innerHTML = `
    <div class="result-card">

      <div class="station-name">${s.nombre_legal || 'Estación'}</div>
      <div class="station-addr">${s.direccion || ''}</div>

      <div class="price">$${fmt(r.display_price)} /L</div>

      <div class="meta">
        <div>📍 ${r.display_distance_km} km</div>
        <div>⛽ ${r.display_liters} L</div>
      </div>

      <div class="meta">
        <div>Total</div>
        <div>$${fmt(r.display_total_cost)}</div>
      </div>

      <div class="alt-section">
        ${alt}
      </div>

      <div class="status">
        ${data.message || ''}
      </div>

    </div>
  `;
}

</script>

</body>
</html>
