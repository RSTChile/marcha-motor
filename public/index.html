<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Marcha · Optimizador de recarga</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            padding: 1rem;
            color: #1e2a3e;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* tarjeta principal */
        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .card-header {
            background: #0b3b3f;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .card-header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .card-header p {
            opacity: 0.8;
            margin-top: 0.25rem;
            font-size: 0.9rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* formulario */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #2c5f6b;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            font-size: 1rem;
            background: #fff;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0b3b3f;
            box-shadow: 0 0 0 3px rgba(11,59,63,0.1);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        button {
            background: #0b3b3f;
            color: white;
            border: none;
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #0f5257;
            transform: scale(0.98);
        }

        /* resultado */
        .result-card {
            background: #fef9e3;
            border-left: 6px solid #f5a623;
            padding: 1.25rem;
            border-radius: 1.5rem;
            margin-top: 1.5rem;
        }

        .mode-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
            background: #e2e8f0;
            margin-bottom: 0.75rem;
        }

        .mode-0 { background: #d1fae5; color: #065f46; }
        .mode-1 { background: #fed7aa; color: #9b4a00; }
        .mode-2 { background: #ffe4e2; color: #9b1c1c; }
        .mode-3 { background: #e2e8f0; color: #334155; }

        .station-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .saving {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0b3b3f;
            margin: 0.5rem 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #ddd;
            font-size: 0.9rem;
        }

        .message {
            background: #ffffffcc;
            padding: 0.8rem;
            border-radius: 1rem;
            margin-top: 0.8rem;
            font-style: italic;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #0b3b3f;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>⛽ Marcha</h1>
            <p>decide si vale la pena cargar · no adivina, calcula</p>
        </div>
        <div class="card-body">
            <form id="marchaForm">
                <div class="form-group">
                    <label>📍 Tu ubicación actual (aproximada)</label>
                    <div class="row-2">
                        <input type="text" id="lat" placeholder="Latitud" value="-32.8396" step="any">
                        <input type="text" id="lng" placeholder="Longitud" value="-70.9530" step="any">
                    </div>
                    <small style="color:#6c7a91">Ej: Llay-Llay → -32.8396, -70.9530</small>
                </div>

                <div class="form-group">
                    <label>🚗 Tipo de uso</label>
                    <select id="contextType">
                        <option value="domestic">🚘 Doméstico / particular</option>
                        <option value="labor">📱 Laboral (conductor)</option>
                        <option value="cargo">🚛 Transporte de carga (empresa)</option>
                    </select>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label>⛽ Consumo (L/100km)</label>
                        <input type="number" id="consumption" value="10" step="0.5">
                    </div>
                    <div class="form-group">
                        <label>🛢️ Capacidad estanque (L)</label>
                        <input type="number" id="tankCapacity" value="56" step="1">
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label>📉 Nivel actual (%)</label>
                        <input type="number" id="fuelLevel" value="20" step="5">
                    </div>
                    <div class="form-group">
                        <label>💰 Presupuesto hoy ($)</label>
                        <input type="number" id="budget" value="25000" step="5000">
                    </div>
                </div>

                <div class="form-group">
                    <label>⛽ Tipo de combustible</label>
                    <select id="fuelType">
                        <option value="diesel">Diesel</option>
                        <option value="gas93">Gasolina 93</option>
                        <option value="gas95">Gasolina 95</option>
                        <option value="gas97">Gasolina 97</option>
                    </select>
                </div>

                <button type="submit">🔍 Evaluar ahora</button>
            </form>

            <div id="resultArea">
                <!-- aquí se mostrará la decisión -->
                <div class="result-card" style="background:#f1f5f9; text-align:center; color:#4a5b6e;">
                    ⚡ Completa tus datos y presiona "Evaluar ahora"<br>
                    <span style="font-size:0.8rem;">El motor analiza estaciones reales en tu zona</span>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        Marcha · motor de decisión no teleológico · datos desde API real + crowdsourcing
    </div>
</div>

<script>
    const form = document.getElementById('marchaForm');
    const resultArea = document.getElementById('resultArea');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // mostrar loading
        resultArea.innerHTML = `<div class="loading">🔄 Evaluando estaciones cercanas...<br><span style="font-size:0.8rem;">buscando mejor decisión para ti</span></div>`;

        // recolectar datos del formulario
        const lat = parseFloat(document.getElementById('lat').value);
        const lng = parseFloat(document.getElementById('lng').value);
        const contextType = document.getElementById('contextType').value;
        const consumption = parseFloat(document.getElementById('consumption').value);
        const tankCapacity = parseFloat(document.getElementById('tankCapacity').value);
        const fuelLevel = parseFloat(document.getElementById('fuelLevel').value);
        const budget = parseFloat(document.getElementById('budget').value);
        const fuelType = document.getElementById('fuelType').value;

        // validaciones básicas
        if (isNaN(lat) || isNaN(lng)) {
            resultArea.innerHTML = `<div class="result-card"><strong>❌ Error</strong><br>Ingresa coordenadas válidas (lat / lon).</div>`;
            return;
        }
        if (fuelLevel < 0 || fuelLevel > 100) {
            resultArea.innerHTML = `<div class="result-card"><strong>⚠️ Nivel de estanque</strong><br>Debe estar entre 0% y 100%.</div>`;
            return;
        }

        const payload = {
            userProfile: {
                context_type: contextType,
                fuel_consumption: consumption,
                tank_capacity: tankCapacity,
                current_level_pct: fuelLevel,
                budget_today: budget
            },
            context: {
                lat: lat,
                lon: lng,
                fuel_type: fuelType,
                reference_price: null,   // el pipeline calculará la mediana
                is_urban_peak: false,
                toll_estimate: 0
            }
        };

        try {
            const response = await fetch('/api/decide', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Error ${response.status}: ${errorText}`);
            }

            const data = await response.json();
            renderDecision(data);
        } catch (err) {
            console.error('Error llamando al motor:', err);
            resultArea.innerHTML = `<div class="result-card">
                <strong>⚠️ No se pudo conectar con el motor</strong><br>
                ${err.message}<br><br>
                <span style="font-size:0.8rem;">Revisa que el backend esté activo.</span>
            </div>`;
        }
    });

    function renderDecision(data) {
        const mode = data.mode;
        let modeText = '';
        let modeClass = '';

        if (mode === 0) { modeText = '✅ RECOMENDACIÓN ACTIVA'; modeClass = 'mode-0'; }
        else if (mode === 1) { modeText = '⚠️ DATOS INCIERTOS (LF-1)'; modeClass = 'mode-1'; }
        else if (mode === 2) { modeText = '🔄 NO CONVIENE OPTIMIZAR (LF-2)'; modeClass = 'mode-2'; }
        else { modeText = '🔇 SIN DATOS SUFICIENTES'; modeClass = 'mode-3'; }

        let html = `<div class="result-card">`;
        html += `<div class="mode-badge ${modeClass}">${modeText}</div>`;

        if (mode === 0 && data.recommendation) {
            const rec = data.recommendation;
            const station = rec.station || {};
            const netSaving = rec.net_saving || 0;
            const price = rec.display_price || '?';
            const liters = rec.display_liters || 0;
            const distance = rec.display_distance_km || 0;
            const totalCost = (price * liters).toFixed(0);

            html += `<div class="station-name">⛽ ${station.nombre || 'Estación recomendada'}</div>`;
            html += `<div class="saving">💰 Ahorro neto estimado: $${netSaving.toLocaleString()}</div>`;
            html += `<div class="detail-row"><span>Precio por litro</span><strong>$${price}</strong></div>`;
            html += `<div class="detail-row"><span>Carga recomendada</span><strong>${liters.toFixed(1)} litros</strong></div>`;
            html += `<div class="detail-row"><span>Costo total aproximado</span><strong>$${totalCost.toLocaleString()}</strong></div>`;
            html += `<div class="detail-row"><span>Desvío desde tu ubicación</span><strong>${distance.toFixed(1)} km</strong></div>`;
            if (rec.is_convenio) html += `<div class="detail-row"><span>🏷️ Precio con convenio</span><strong>Sí</strong></div>`;

            if (data.alternative) {
                const alt = data.alternative;
                const altStation = alt.station || {};
                html += `<hr>`;
                html += `<div style="font-size:0.85rem; opacity:0.8;">🔄 Alternativa: ${altStation.nombre || 'otra estación'} · ahorro $${(alt.net_saving || 0).toLocaleString()}</div>`;
            }
        } else if (mode === 0 && !data.recommendation) {
            html += `<div class="message">⚠️ El motor no encontró una estación óptima con tus parámetros actuales.</div>`;
        }

        if (data.message) {
            html += `<div class="message">💬 ${data.message}</div>`;
        }

        if (mode === 1) {
            html += `<div class="message">🔍 Los precios disponibles no están completamente verificados.<br>El motor prefiere declarar incertidumbre antes que engañarte.</div>`;
        }
        if (mode === 2 && !data.message?.includes('poco combustible')) {
            html += `<div class="message">📉 El ahorro potencial no justifica desviarte. Sigue tu ruta normal.</div>`;
        }
        if (mode === 3) {
            html += `<div class="message">🧭 No hay estaciones registradas cerca de tu ubicación.<br>¿Has ejecutado el crawler o cargado el archivo stations.json?</div>`;
        }

        html += `</div>`;
        resultArea.innerHTML = html;
    }
</script>
</body>
</html>
